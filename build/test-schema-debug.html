<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schema 调试工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #1890ff;
      border-bottom: 2px solid #1890ff;
      padding-bottom: 10px;
    }
    .section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .button-group {
      margin: 15px 0;
    }
    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
      font-size: 14px;
    }
    button:hover {
      background: #40a9ff;
    }
    button.secondary {
      background: #52c41a;
    }
    button.secondary:hover {
      background: #73d13d;
    }
    textarea {
      width: 100%;
      min-height: 400px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      padding: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .stats {
      background: #e6f7ff;
      padding: 15px;
      border-radius: 4px;
      margin: 15px 0;
      border-left: 4px solid #1890ff;
    }
    .stats-item {
      margin: 5px 0;
      font-size: 14px;
    }
    .field-list {
      background: #fafafa;
      padding: 15px;
      border-radius: 4px;
      margin: 15px 0;
      max-height: 300px;
      overflow-y: auto;
    }
    .field-item {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      padding: 5px;
      border-bottom: 1px solid #e8e8e8;
    }
    .field-item:last-child {
      border-bottom: none;
    }
    .field-key {
      color: #c41d7f;
      font-weight: bold;
    }
    .field-value {
      color: #096dd9;
    }
  </style>
</head>
<body>
  <h1>📊 Schema 字段调试工具</h1>
  
  <div class="section">
    <h2>1. 输入 Schema JSON</h2>
    <textarea id="input" placeholder='粘贴 Schema JSON...&#10;&#10;例如从浏览器控制台复制 multiPageSchema 的内容'></textarea>
    <div class="button-group">
      <button onclick="loadSample()">加载示例数据</button>
      <button onclick="analyzeFields()">分析字段</button>
    </div>
  </div>

  <div class="section">
    <h2>2. 字段统计</h2>
    <div id="stats" class="stats">点击"分析字段"按钮开始...</div>
  </div>

  <div class="section">
    <h2>3. 所有字段列表（按出现次数排序）</h2>
    <div id="fields" class="field-list">等待分析...</div>
  </div>

  <div class="section">
    <h2>4. 可能的默认值字段</h2>
    <div id="defaults" class="field-list">等待分析...</div>
  </div>

  <script>
    function loadSample() {
      const sample = {
        "version": "1.0.0",
        "pages": [
          {
            "componentName": "Page",
            "id": "page_1",
            "fileName": "首页",
            "props": {
              "ref": "page_page_1",
              "style": {
                "height": "100%",
                "paddingLeft": "83px",
                "paddingRight": "83px",
                "paddingTop": "10px",
                "paddingBottom": "22px"
              }
            },
            "children": [
              {
                "componentName": "NextText",
                "id": "text_1",
                "props": {
                  "mark": false,
                  "code": false,
                  "delete": false,
                  "underline": false,
                  "strong": false,
                  "children": "示例文本"
                },
                "hidden": false,
                "isLocked": false,
                "condition": true
              }
            ],
            "settings": {
              "id": "page_1",
              "name": "首页",
              "isHomePage": true
            }
          }
        ],
        "currentPageId": "page_1",
        "metadata": {
          "totalPages": 1,
          "updatedAt": "2025-06-10T00:00:00.000Z"
        }
      };
      document.getElementById('input').value = JSON.stringify(sample, null, 2);
    }

    function analyzeFields() {
      const input = document.getElementById('input').value;
      if (!input.trim()) {
        alert('请先输入或加载 Schema JSON');
        return;
      }

      try {
        const schema = JSON.parse(input);
        const fieldCounts = {};
        const fieldValues = {};

        // 递归收集所有字段
        function collectFields(obj, path = '') {
          if (!obj || typeof obj !== 'object') return;

          if (Array.isArray(obj)) {
            obj.forEach((item, index) => collectFields(item, `${path}[${index}]`));
            return;
          }

          for (const key in obj) {
            const fullPath = path ? `${path}.${key}` : key;
            const value = obj[key];

            // 统计字段出现次数
            if (!fieldCounts[key]) {
              fieldCounts[key] = 0;
              fieldValues[key] = new Set();
            }
            fieldCounts[key]++;

            // 记录字段值（非对象）
            if (typeof value !== 'object' || value === null) {
              fieldValues[key].add(JSON.stringify(value));
            }

            // 递归处理子对象
            collectFields(value, fullPath);
          }
        }

        collectFields(schema);

        // 排序字段（按出现次数）
        const sortedFields = Object.entries(fieldCounts)
          .sort((a, b) => b[1] - a[1]);

        // 显示统计
        const totalFields = sortedFields.length;
        const totalOccurrences = Object.values(fieldCounts).reduce((a, b) => a + b, 0);
        document.getElementById('stats').innerHTML = `
          <div class="stats-item"><strong>总字段数:</strong> ${totalFields}</div>
          <div class="stats-item"><strong>总出现次数:</strong> ${totalOccurrences}</div>
          <div class="stats-item"><strong>平均出现次数:</strong> ${(totalOccurrences / totalFields).toFixed(2)}</div>
        `;

        // 显示字段列表
        document.getElementById('fields').innerHTML = sortedFields
          .map(([key, count]) => {
            const values = Array.from(fieldValues[key]).slice(0, 5).join(', ');
            return `<div class="field-item">
              <span class="field-key">${key}</span>: 
              出现 <strong>${count}</strong> 次
              ${values ? ` - 示例值: <span class="field-value">${values}</span>` : ''}
            </div>`;
          })
          .join('');

        // 分析可能的默认值字段
        const possibleDefaults = sortedFields
          .filter(([key, count]) => {
            const values = Array.from(fieldValues[key]);
            // 如果字段值只有一个，且出现次数 > 1，可能是默认值
            return values.length === 1 && count > 1;
          })
          .map(([key, count]) => {
            const value = Array.from(fieldValues[key])[0];
            return { key, count, value };
          });

        if (possibleDefaults.length === 0) {
          document.getElementById('defaults').innerHTML = '<div class="field-item">未发现明显的默认值字段</div>';
        } else {
          document.getElementById('defaults').innerHTML = possibleDefaults
            .map(({ key, count, value }) => `<div class="field-item">
              <span class="field-key">${key}</span>: 
              固定值 <span class="field-value">${value}</span>
              (出现 <strong>${count}</strong> 次)
            </div>`)
            .join('');
        }

      } catch (error) {
        alert('JSON 解析失败: ' + error.message);
      }
    }
  </script>
</body>
</html>
